# GitHub Pages deploy for the legacy/demo surface only.
# Canonical production lives in Firebase App Hosting under apps/production.
name: Deploy demo site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent demo deployment, skipping queued runs between the in-progress and latest queued run.
concurrency:
  group: "pages-demo"
  cancel-in-progress: false

jobs:
  # Demo build job for the root GitHub Pages surface
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build root demo app for Pages export
        env:
          BUILD_TARGET: "pages"
          NEXT_PUBLIC_DEMO_AUTH_MODE: "true"
          NEXT_PUBLIC_DEMO_PHONE: "8761085453"
          NEXT_PUBLIC_DEMO_EMAIL: "test@example.com"
          NEXT_PUBLIC_DEMO_PASSWORD: "Test@12345"
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out


  # Demo deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
