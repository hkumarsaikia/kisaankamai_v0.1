<!DOCTYPE html>
<html>
<head>
  <title>Firebase OTP Test</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCeFikW5CPxlCA1KlgW1Pbz8K371xTpDTI",
      authDomain: "gokisaan.firebaseapp.com",
      projectId: "gokisaan",
      storageBucket: "gokisaan.firebasestorage.app",
      messagingSenderId: "385695590128",
      appId: "1:385695590128:web:8ae3734344861e8b808435",
      measurementId: "G-P246QD9TH4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.onload = () => {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        'size': 'normal',
        'callback': (response) => {
          console.log("reCAPTCHA solved:", response);
        },
        'expired-callback': () => {
          console.log("reCAPTCHA expired");
        }
      });
      window.recaptchaVerifier.render();

      document.getElementById('send-btn').addEventListener('click', () => {
        const phone = document.getElementById('phone').value;
        console.log("Sending OTP to", phone);
        
        signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
          .then((confirmationResult) => {
            console.log("SUCCESS! SMS Sent.");
            document.getElementById('status').innerText = "SUCCESS! SMS SENT.";
            window.confirmationResult = confirmationResult;
          }).catch((error) => {
            console.error("ERROR:", error);
            document.getElementById('status').innerText = "ERROR: " + error.message;
          });
      });
    };
  </script>
</head>
<body>
  <h1>Firebase OTP Test</h1>
  <div id="recaptcha-container"></div>
  <br>
  <input type="text" id="phone" value="+918761085453" />
  <button id="send-btn">Send OTP</button>
  <p id="status"></p>
</body>
</html>
